# Schedule refreshed: 2026-04-14 19:06:42
name: Dashboard (GitHub Pages)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["GitHub Issue Tracker"]
    types: [completed]

concurrency:
  group: dashboard
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tracker/requirements.txt

      - name: Install dependencies
        run: pip install -q requests

      - name: Generate Dashboard
        working-directory: tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATE_FILE: ${{ github.workspace }}/tracker/state/tracked_issues_state.json
          OUTPUT_HTML: ${{ github.workspace }}/_site/index.html
        run: |
          mkdir -p ${{ github.workspace }}/_site
          python generate_dashboard.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

